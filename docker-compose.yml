services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: sql_arena
      # Dev-only role passwords consumed by db/00-bootstrap.sh during initdb.
      # Override in real deployments; never commit production values.
      ARENA_RUNNER_PASSWORD: ${ARENA_RUNNER_PASSWORD:-runner}
      ARENA_RW_PASSWORD: ${ARENA_RW_PASSWORD:-rw}
    ports:
      # Host port is overridable so it doesn't collide with a Postgres you may
      # already run locally: `POSTGRES_PORT=5433 docker compose up`.
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      # PG18+ images store data in a major-version subdirectory and expect the
      # mount at /var/lib/postgresql (not /…/data). See docker-library/postgres#1259.
      - pgdata:/var/lib/postgresql
      # Auto-bootstrap schema/roles on a fresh volume. Only db/00-bootstrap.sh
      # is top-level, so the entrypoint runs it (not the ./sql includes) once.
      - ./db:/docker-entrypoint-initdb.d:ro
      # Generated seed CSVs, readable by the server for server-side COPY
      # (AgDR-0007): the loader runs `COPY seed.x FROM '/seed-data/x.csv'`.
      - ./generated:/seed-data:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U arena -d sql_arena']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgres://arena:arena@postgres:5432/sql_arena
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
