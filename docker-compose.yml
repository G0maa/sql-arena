services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena
      POSTGRES_DB: sql_arena
    ports:
      # Host port is overridable so it doesn't collide with a Postgres you may
      # already run locally: `POSTGRES_PORT=5433 docker compose up`.
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U arena -d sql_arena']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgres://arena:arena@postgres:5432/sql_arena
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
