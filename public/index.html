<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SQL Arena</title>
    <style>
      :root {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        text-align: center;
        padding: 2rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 2.25rem;
      }
      p {
        margin: 0.25rem 0;
        color: #94a3b8;
      }
      code {
        background: #1e293b;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>🏟️ SQL Arena</h1>
      <p>Run your query against the shared dataset. Get correctness + time. Climb the leaderboard.</p>
      <p>Scaffold is live. The submission UI ships in a later step.</p>
      <p>Health check: <code>GET /health</code></p>
    </main>
  </body>
</html>
