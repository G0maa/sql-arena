<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SQL Arena</title>
    <style>
      :root {
        --bg: #0f172a;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --panel: #1e293b;
        --accent: #7dd3fc;
        --ok: #4ade80;
        --bad: #f87171;
        --warn: #fbbf24;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid #334155;
      }
      header h1 {
        margin: 0;
        font-size: 1.75rem;
      }
      header p {
        margin: 0.25rem 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 1.5rem;
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      @media (min-width: 860px) {
        main {
          grid-template-columns: 1.4fr 1fr;
        }
      }
      .full {
        grid-column: 1 / -1;
      }
      .erd-wrap {
        overflow-x: auto;
        border: 1px solid #334155;
        border-radius: 4px;
        background: #0f172a;
      }
      .erd-wrap img {
        display: block;
        width: 100%;
        min-width: 720px;
        height: auto;
      }
      .panel h2 .hint {
        color: var(--muted);
        font-weight: 400;
        font-size: 0.82rem;
      }
      .expected {
        margin-bottom: 1rem;
      }
      .expected .meta {
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 0.4rem;
      }
      .expected .meta strong {
        color: var(--accent);
        font-weight: 600;
      }
      .expected .tag {
        display: inline-block;
        background: rgba(125, 211, 252, 0.12);
        color: var(--accent);
        border-radius: 3px;
        padding: 0.05rem 0.4rem;
        margin-left: 0.35rem;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .expected-table-wrap {
        overflow-x: auto;
        border: 1px solid #334155;
        border-radius: 4px;
      }
      table.expected-table {
        font-size: 0.82rem;
        white-space: nowrap;
      }
      table.expected-table th {
        color: var(--accent);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-weight: 600;
      }
      table.expected-table td {
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      table.expected-table tr:last-child td {
        border-bottom: none;
      }
      .expected .sample-label {
        font-size: 0.72rem;
        color: var(--muted);
        padding: 0.3rem 0.5rem 0;
      }
      .expected .empty-note {
        font-size: 0.8rem;
        color: var(--muted);
        padding: 0.5rem;
        border: 1px dashed #475569;
        border-radius: 4px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid #334155;
        border-radius: 4px;
        padding: 1.25rem;
      }
      .panel h2 {
        margin: 0 0 0.75rem;
        font-size: 1.05rem;
        color: var(--accent);
      }
      label {
        display: block;
        margin: 0 0 0.35rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .field {
        margin-bottom: 1rem;
      }
      select,
      input[type='text'],
      textarea {
        width: 100%;
        background: #0f172a;
        color: var(--text);
        border: 1px solid #475569;
        border-radius: 4px;
        padding: 0.55rem 0.65rem;
        font-size: 0.95rem;
        font-family: inherit;
      }
      textarea {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        resize: vertical;
        min-height: 5rem;
      }
      textarea#solution {
        min-height: 8rem;
      }
      select:focus,
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent);
      }
      .prompt {
        background: #0f172a;
        border: 1px solid #475569;
        border-radius: 4px;
        padding: 0.75rem;
        color: var(--muted);
        white-space: pre-wrap;
        font-size: 0.9rem;
        margin-bottom: 1rem;
        min-height: 2.5rem;
      }
      button {
        background: var(--accent);
        color: #0f172a;
        border: none;
        border-radius: 4px;
        padding: 0.6rem 1.4rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        background: #475569;
        color: #94a3b8;
        cursor: not-allowed;
      }
      .status {
        margin-top: 1rem;
        padding: 0.75rem;
        border-radius: 4px;
        background: #0f172a;
        border: 1px solid #475569;
        font-size: 0.9rem;
        min-height: 1.2rem;
      }
      .status.hidden {
        display: none;
      }
      .badge {
        display: inline-block;
        padding: 0.15rem 0.55rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .badge.correct {
        background: rgba(74, 222, 128, 0.15);
        color: var(--ok);
      }
      .badge.incorrect,
      .badge.error,
      .badge.timeout {
        background: rgba(248, 113, 113, 0.15);
        color: var(--bad);
      }
      .badge.running,
      .badge.queued {
        background: rgba(125, 211, 252, 0.15);
        color: var(--accent);
      }
      .msg {
        margin-top: 0.5rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.82rem;
        color: var(--warn);
        white-space: pre-wrap;
        word-break: break-word;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      th,
      td {
        text-align: left;
        padding: 0.45rem 0.5rem;
        border-bottom: 1px solid #334155;
      }
      th {
        color: var(--muted);
        font-weight: 600;
      }
      td.num,
      th.num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .empty {
        color: var(--muted);
        font-size: 0.88rem;
        padding: 0.5rem 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🏟️ SQL Arena</h1>
      <p>Run your query against the shared dataset. Get correctness + time. Climb the leaderboard.</p>
    </header>

    <main>
      <section class="panel full" aria-label="Database schema">
        <h2>Database schema <span class="hint">— query the <code>seed</code> schema · only PKs are indexed</span></h2>
        <div class="erd-wrap">
          <img src="erd.svg" alt="Entity-relationship diagram of the seed schema: category, customer, product, orders, and order_details tables with their columns, types, and foreign-key relationships." />
        </div>
      </section>

      <section class="panel" aria-label="Submission">
        <h2>Your submission</h2>

        <div class="field">
          <label for="question">Question</label>
          <select id="question"></select>
        </div>

        <div class="prompt" id="prompt">Loading questions…</div>

        <div class="expected" id="expected"></div>

        <div class="field">
          <label for="name">Display name</label>
          <input type="text" id="name" placeholder="e.g. ada-lovelace" autocomplete="off" />
        </div>

        <div class="field">
          <label for="setup">Setup SQL (optional — add indexes here; not timed)</label>
          <textarea
            id="setup"
            placeholder="-- optional: CREATE INDEX ... (runs before your solution, not counted in your time)"
          ></textarea>
        </div>

        <div class="field">
          <label for="solution">Solution SQL (timed)</label>
          <textarea id="solution" placeholder="SELECT ... -- a single SELECT or WITH query"></textarea>
        </div>

        <button id="submit" disabled>Submit</button>

        <div class="status hidden" id="status"></div>
      </section>

      <section class="panel" aria-label="Leaderboard">
        <h2>Leaderboard — <span id="lb-question">—</span></h2>
        <table>
          <thead>
            <tr>
              <th class="num">#</th>
              <th>Name</th>
              <th class="num">Time (ms)</th>
            </tr>
          </thead>
          <tbody id="leaderboard"></tbody>
        </table>
        <div class="empty hidden" id="lb-empty">No ranked submissions yet — be the first.</div>
      </section>
    </main>

    <script>
      const els = {
        question: document.getElementById('question'),
        prompt: document.getElementById('prompt'),
        expected: document.getElementById('expected'),
        name: document.getElementById('name'),
        setup: document.getElementById('setup'),
        solution: document.getElementById('solution'),
        submit: document.getElementById('submit'),
        status: document.getElementById('status'),
        lbQuestion: document.getElementById('lb-question'),
        leaderboard: document.getElementById('leaderboard'),
        lbEmpty: document.getElementById('lb-empty'),
      };

      let questions = [];
      let inFlight = false;

      function escapeHtml(s) {
        return String(s ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function selectedCode() {
        return els.question.value || null;
      }

      function refreshSubmitEnabled() {
        const ready =
          !inFlight &&
          !!selectedCode() &&
          els.name.value.trim() !== '' &&
          els.solution.value.trim() !== '';
        els.submit.disabled = !ready;
      }

      function showStatus(html) {
        els.status.classList.remove('hidden');
        els.status.innerHTML = html;
      }

      async function loadQuestions() {
        try {
          const res = await fetch('/api/questions');
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          questions = await res.json();
        } catch (err) {
          els.prompt.textContent = `Could not load questions: ${err.message}`;
          return;
        }
        els.question.innerHTML = '';
        for (const q of questions) {
          const opt = document.createElement('option');
          opt.value = q.code;
          opt.textContent = `${q.code} — ${q.title}`;
          els.question.appendChild(opt);
        }
        if (questions.length > 0) {
          els.question.value = questions[0].code;
          onQuestionChange();
        } else {
          els.prompt.textContent = 'No questions available.';
        }
        refreshSubmitEnabled();
      }

      function onQuestionChange() {
        const code = selectedCode();
        const q = questions.find((x) => x.code === code);
        els.prompt.textContent = q ? q.prompt : '';
        renderExpected(q);
        loadLeaderboard(code);
        refreshSubmitEnabled();
      }

      // Output-format hint: expected columns, row count, order sensitivity, and
      // a single sample row. Helps contestants match the exact result shape the
      // grader compares against (it's an exact full-result match).
      function renderExpected(q) {
        if (!q || !q.expected_columns || q.expected_columns.length === 0) {
          els.expected.innerHTML = '';
          return;
        }
        const cols = q.expected_columns;
        const order = q.ordered
          ? '<span class="tag">order matters</span>'
          : '<span class="tag">any order</span>';
        const count =
          typeof q.expected_row_count === 'number'
            ? `<strong>${q.expected_row_count}</strong> row${q.expected_row_count === 1 ? '' : 's'}`
            : '';

        let body;
        if (q.sample_row && q.sample_row.length === cols.length) {
          const head = cols.map((c) => `<th>${escapeHtml(c)}</th>`).join('');
          const cells = q.sample_row
            .map(
              (v) =>
                `<td>${v === null ? '<span style="color:#64748b">NULL</span>' : escapeHtml(v)}</td>`,
            )
            .join('');
          body =
            `<div class="sample-label">sample row (the rest of the answer is hidden)</div>` +
            `<table class="expected-table"><thead><tr>${head}</tr></thead>` +
            `<tbody><tr>${cells}</tr></tbody></table>`;
        } else if (q.expected_row_count === 0) {
          const head = cols.map((c) => `<th>${escapeHtml(c)}</th>`).join('');
          body =
            `<table class="expected-table"><thead><tr>${head}</tr></thead></table>` +
            `<div class="empty-note">The correct answer is an <strong>empty result</strong> (0 rows) for this dataset — return these columns with no rows.</div>`;
        } else {
          body = cols
            .map((c) => `<span class="tag">${escapeHtml(c)}</span>`)
            .join('');
        }

        els.expected.innerHTML =
          `<div class="meta">Expected output: ${count} · ${cols.length} column${cols.length === 1 ? '' : 's'} ${order}</div>` +
          `<div class="expected-table-wrap">${body}</div>`;
      }

      async function loadLeaderboard(code) {
        els.lbQuestion.textContent = code || '—';
        if (!code) return;
        let rows = [];
        try {
          const res = await fetch(`/api/leaderboard/${encodeURIComponent(code)}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          rows = await res.json();
        } catch (err) {
          els.leaderboard.innerHTML = '';
          els.lbEmpty.classList.remove('hidden');
          els.lbEmpty.textContent = `Could not load leaderboard: ${err.message}`;
          return;
        }
        els.leaderboard.innerHTML = '';
        if (rows.length === 0) {
          els.lbEmpty.textContent = 'No ranked submissions yet — be the first.';
          els.lbEmpty.classList.remove('hidden');
          return;
        }
        els.lbEmpty.classList.add('hidden');
        for (const row of rows) {
          const tr = document.createElement('tr');
          tr.innerHTML =
            `<td class="num">${row.rank}</td>` +
            `<td>${escapeHtml(row.display_name)}</td>` +
            `<td class="num">${escapeHtml(row.exec_ms)}</td>`;
          els.leaderboard.appendChild(tr);
        }
      }

      function renderDone(s) {
        const result = s.result || 'unknown';
        let html = `<span class="badge ${escapeHtml(result)}">${escapeHtml(result)}</span>`;
        if (result === 'correct' && s.exec_ms != null) {
          html += ` &nbsp;ran in <strong>${escapeHtml(s.exec_ms)} ms</strong>`;
          if (s.ranked) html += ' &nbsp;— on the leaderboard 🎉';
        }
        if (s.message) {
          html += `<div class="msg">${escapeHtml(s.message)}</div>`;
        }
        showStatus(html);
      }

      function pollLoop(id) {
        setTimeout(async () => {
          let s;
          try {
            const res = await fetch(`/api/submission/${encodeURIComponent(id)}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            s = await res.json();
          } catch (err) {
            showStatus(`<span class="badge error">error</span> &nbsp;${escapeHtml(err.message)}`);
            inFlight = false;
            refreshSubmitEnabled();
            return;
          }

          if (s.status === 'queued') {
            const pos = s.position != null ? ` (position ${s.position})` : '';
            showStatus(`<span class="badge queued">queued</span>${escapeHtml(pos)}`);
            pollLoop(id);
          } else if (s.status === 'running') {
            showStatus('<span class="badge running">running</span> &nbsp;executing your query…');
            pollLoop(id);
          } else {
            renderDone(s);
            inFlight = false;
            refreshSubmitEnabled();
            if (s.status === 'done' && s.result === 'correct') {
              loadLeaderboard(selectedCode());
            }
          }
        }, 1000);
      }

      async function submit() {
        const code = selectedCode();
        if (!code) return;
        inFlight = true;
        refreshSubmitEnabled();
        showStatus('<span class="badge queued">submitting…</span>');

        const setup = els.setup.value.trim();
        const body = {
          question_code: code,
          display_name: els.name.value.trim(),
          sql: els.solution.value,
        };
        if (setup !== '') body.setup_sql = setup;

        let data;
        try {
          const res = await fetch('/api/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          data = await res.json().catch(() => ({}));
          if (!res.ok) {
            const detail = data && data.message ? data.message : `HTTP ${res.status}`;
            throw new Error(Array.isArray(detail) ? detail.join('; ') : detail);
          }
        } catch (err) {
          showStatus(`<span class="badge error">rejected</span> &nbsp;${escapeHtml(err.message)}`);
          inFlight = false;
          refreshSubmitEnabled();
          return;
        }

        showStatus('<span class="badge queued">queued</span>');
        pollLoop(data.submission_id);
      }

      els.question.addEventListener('change', onQuestionChange);
      els.name.addEventListener('input', refreshSubmitEnabled);
      els.solution.addEventListener('input', refreshSubmitEnabled);
      els.submit.addEventListener('click', submit);

      loadQuestions();
    </script>
  </body>
</html>
